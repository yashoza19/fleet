apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: test-cluster-01

resources:
  - ../../../cluster-templates/aws-ha/base/hive

patches:
  - path: patches/install-config.yaml
  - target:
      kind: Namespace
      name: cluster-placeholder
    patch: |
      - op: replace
        path: /metadata/name
        value: test-cluster-01
  - target:
      kind: ClusterDeployment
      name: cluster-placeholder
    patch: |
      - op: replace
        path: /metadata/name
        value: test-cluster-01
      - op: replace
        path: /metadata/namespace
        value: test-cluster-01
      - op: replace
        path: /spec/clusterName
        value: test-cluster-01
      - op: replace
        path: /spec/provisioning/installConfigSecretRef/name
        value: test-cluster-01-install-config
      - op: replace
        path: /spec/provisioning/sshPrivateKeySecretRef/name
        value: test-cluster-01-ssh-key
  - target:
      kind: MachinePool
      name: cluster-placeholder-worker
    patch: |
      - op: replace
        path: /metadata/name
        value: test-cluster-01-worker
      - op: replace
        path: /metadata/namespace
        value: test-cluster-01
      - op: replace
        path: /spec/clusterDeploymentRef/name
        value: test-cluster-01
  - target:
      kind: ManagedCluster
      name: cluster-placeholder
    patch: |
      - op: replace
        path: /metadata/name
        value: test-cluster-01
      - op: add
        path: /metadata/labels/tier
        value: base
      - op: add
        path: /metadata/labels/environment
        value: development
  - target:
      kind: KlusterletAddonConfig
      name: cluster-placeholder
    patch: |
      - op: replace
        path: /metadata/name
        value: test-cluster-01
      - op: replace
        path: /metadata/namespace
        value: test-cluster-01
      - op: replace
        path: /spec/clusterName
        value: test-cluster-01
      - op: replace
        path: /spec/clusterNamespace
        value: test-cluster-01
  - target:
      kind: Secret
      name: cluster-placeholder-install-config
    patch: |
      - op: replace
        path: /metadata/name
        value: test-cluster-01-install-config
      - op: replace
        path: /metadata/namespace
        value: test-cluster-01
