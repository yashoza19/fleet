apiVersion: v1
kind: Secret
metadata:
  name: cluster-placeholder-install-config
  namespace: cluster-placeholder
type: Opaque
stringData:
  install-config.yaml: |
    apiVersion: v1
    baseDomain: opdev.io
    metadata:
      name: test-cluster-01
    controlPlane:
      name: master
      platform:
        aws:
          type: m7i.2xlarge
      replicas: 1
    compute:
      - name: worker
        platform:
          aws:
            rootVolume:
              iops: 4000
              size: 100
              type: gp3
            type: m7i.2xlarge
        replicas: 0
    networking:
      clusterNetwork:
        - cidr: 10.128.0.0/14
          hostPrefix: 23
      machineNetwork:
        - cidr: 10.0.0.0/16
      serviceNetwork:
        - 172.30.0.0/16
      networkType: OVNKubernetes
    platform:
      aws:
        region: us-east-1
    publish: External
