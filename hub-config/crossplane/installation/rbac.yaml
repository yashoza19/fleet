apiVersion: v1
kind: ServiceAccount
metadata:
  name: crossplane-installer
  namespace: crossplane-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-installer
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-installer
subjects:
  - kind: ServiceAccount
    name: crossplane-installer
    namespace: crossplane-system
roleRef:
  kind: ClusterRole
  name: crossplane-installer
  apiGroup: rbac.authorization.k8s.io