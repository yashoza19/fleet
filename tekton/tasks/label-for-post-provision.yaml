apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: label-for-post-provision
  namespace: openshift-pipelines
spec:
  params:
    - name: cluster-name
      type: string
    - name: pipeline-image
      type: string
  steps:
    - name: label
      image: $(params.pipeline-image)
      imagePullPolicy: Always
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        fleet-label-post-provision --cluster-name "$(params.cluster-name)"
