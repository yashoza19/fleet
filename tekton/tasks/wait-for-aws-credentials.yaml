apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: wait-for-aws-credentials
spec:
  params:
    - name: cluster-name
      type: string
    - name: timeout-seconds
      type: string
      default: ""
    - name: pipeline-image
      type: string
  steps:
    - name: wait
      image: $(params.pipeline-image)
      imagePullPolicy: IfNotPresent
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        fleet-wait-for-aws-creds \
          --cluster-name "$(params.cluster-name)" \
          --timeout-seconds "$(params.timeout-seconds)"
