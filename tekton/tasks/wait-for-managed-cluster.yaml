apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: wait-for-managed-cluster
  namespace: openshift-pipelines
spec:
  params:
    - name: cluster-name
      type: string
    - name: timeout
      type: string
      default: "15m"
    - name: pipeline-image
      type: string
  steps:
    - name: wait
      image: $(params.pipeline-image)
      imagePullPolicy: IfNotPresent
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        fleet-wait-for-managed-cluster \
          --cluster-name "$(params.cluster-name)" \
          --timeout "$(params.timeout)"
