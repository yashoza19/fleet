apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: configure-spoke-oauth
spec:
  params:
    - name: cluster-name
      type: string
    - name: pipeline-image
      type: string
    - name: keycloak-issuer-url
      type: string
    - name: provider-name
      type: string
      default: "RedHat"
  workspaces:
    - name: shared
  steps:
    - name: configure
      image: $(params.pipeline-image)
      imagePullPolicy: IfNotPresent
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        fleet-configure-spoke-oauth \
          --cluster-name "$(params.cluster-name)" \
          --spoke-kubeconfig "$(workspaces.shared.path)/kubeconfig" \
          --cluster-dir "$(workspaces.shared.path)/clusters/$(params.cluster-name)" \
          --keycloak-issuer-url "$(params.keycloak-issuer-url)" \
          --provider-name "$(params.provider-name)"
