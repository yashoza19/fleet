apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: register-keycloak-client
spec:
  params:
    - name: cluster-name
      type: string
    - name: pipeline-image
      type: string
    - name: keycloak-url
      type: string
    - name: keycloak-realm
      type: string
    - name: keycloak-admin-secret
      type: string
    - name: base-domain
      type: string
    - name: auth-realm
      type: string
      default: ""
    - name: provider-name
      type: string
      default: ""
    - name: insecure
      type: string
      default: ""
  steps:
    - name: register
      image: $(params.pipeline-image)
      imagePullPolicy: IfNotPresent
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        ARGS=(
          --cluster-name "$(params.cluster-name)"
          --keycloak-url "$(params.keycloak-url)"
          --keycloak-realm "$(params.keycloak-realm)"
          --keycloak-admin-secret "$(params.keycloak-admin-secret)"
          --base-domain "$(params.base-domain)"
          --auth-realm "$(params.auth-realm)"
          --provider-name "$(params.provider-name)"
        )
        if [ "$(params.insecure)" = "true" ]; then
          ARGS+=(--insecure)
        fi
        fleet-register-keycloak-client "${ARGS[@]}"
