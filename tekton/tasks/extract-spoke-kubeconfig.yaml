apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: extract-spoke-kubeconfig
spec:
  params:
    - name: cluster-name
      type: string
    - name: pipeline-image
      type: string
    - name: spoke-kubeconfig
      type: string
      default: ""
  workspaces:
    - name: shared
  steps:
    - name: extract
      image: $(params.pipeline-image)
      imagePullPolicy: Always
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        EXTRA_ARGS=()
        if [[ -n "$(params.spoke-kubeconfig)" ]]; then
          EXTRA_ARGS+=(--spoke-kubeconfig "$(params.spoke-kubeconfig)")
        fi
        fleet-extract-kubeconfig \
          --cluster-name "$(params.cluster-name)" \
          --output-dir "$(workspaces.shared.path)" \
          "${EXTRA_ARGS[@]}"
