apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: extract-spoke-kubeconfig
  namespace: openshift-pipelines
spec:
  params:
    - name: cluster-name
      type: string
    - name: pipeline-image
      type: string
  workspaces:
    - name: shared
  steps:
    - name: extract
      image: $(params.pipeline-image)
      imagePullPolicy: IfNotPresent
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        fleet-extract-kubeconfig \
          --cluster-name "$(params.cluster-name)" \
          --output-dir "$(workspaces.shared.path)"
