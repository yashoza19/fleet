---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: cleanup-hub-artifacts
  namespace: openshift-pipelines
spec:
  params:
    - name: cluster-name
      type: string
    - name: pipeline-image
      type: string
  steps:
    - name: cleanup
      image: $(params.pipeline-image)
      imagePullPolicy: IfNotPresent
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        fleet-cleanup-hub-artifacts --cluster-name "$(params.cluster-name)"
