apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: post-provision
spec:
  params:
    - name: cluster-name
      type: string
    - name: tier
      type: string
    - name: git-repo-url
      type: string
      default: https://github.com/redhat-openshift-partner-labs/fleet.git
    - name: git-revision
      type: string
      default: main
    - name: pipeline-image
      type: string
      default: quay.io/rhopl/fleet-pipeline:latest
    - name: keycloak-url
      type: string
    - name: keycloak-realm
      type: string
    - name: keycloak-admin-secret
      type: string
    - name: auth-realm
      type: string
    - name: base-domain
      type: string
      default: example.com
    - name: keycloak-issuer-url
      type: string
      default: https://keycloak.example.com/realms/openshift
    - name: provider-name
      type: string
      default: "RedHat"
    - name: insecure
      type: string
      default: "false"
    - name: dns-zones
      type: string
    - name: acme-email
      type: string
      default: admin@example.com
    - name: openshift-cluster
      type: string
      default: "true"
  workspaces:
    - name: shared-workspace

  tasks:
    - name: git-clone
      taskRef:
        name: git-clone
      params:
        - name: URL
          value: $(params.git-repo-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DEPTH
          value: "1"
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: extract-spoke-kubeconfig
      taskRef:
        name: extract-spoke-kubeconfig
      runAfter:
        - git-clone
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)
      workspaces:
        - name: shared
          workspace: shared-workspace

    - name: save-spoke-kubeconfig
      taskRef:
        name: save-spoke-kubeconfig
      runAfter:
        - extract-spoke-kubeconfig
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)
      workspaces:
        - name: shared
          workspace: shared-workspace

    - name: register-keycloak-client
      when:
        - input: $(params.openshift-cluster)
          operator: in
          values:
            - "true"
      taskRef:
        name: register-keycloak-client
      runAfter:
        - save-spoke-kubeconfig
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)
        - name: keycloak-url
          value: $(params.keycloak-url)
        - name: keycloak-realm
          value: $(params.keycloak-realm)
        - name: keycloak-admin-secret
          value: $(params.keycloak-admin-secret)
        - name: base-domain
          value: $(params.base-domain)
        - name: auth-realm
          value: $(params.auth-realm)
        - name: provider-name
          value: $(params.provider-name)
        - name: insecure
          value: $(params.insecure)

    - name: configure-spoke-oauth
      when:
        - input: $(params.openshift-cluster)
          operator: in
          values:
            - "true"
      taskRef:
        name: configure-spoke-oauth
      runAfter:
        - register-keycloak-client
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)
        - name: keycloak-issuer-url
          value: $(params.keycloak-issuer-url)
        - name: provider-name
          value: $(params.provider-name)
      workspaces:
        - name: shared
          workspace: shared-workspace

    - name: create-cluster-issuer
      when:
        - input: $(params.openshift-cluster)
          operator: in
          values:
            - "true"
      taskRef:
        name: create-cluster-issuer
      runAfter:
        - configure-spoke-oauth
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)
        - name: acme-email
          value: $(params.acme-email)

    - name: request-ssl-cert
      when:
        - input: $(params.openshift-cluster)
          operator: in
          values:
            - "true"
      taskRef:
        name: request-ssl-cert
      runAfter:
        - create-cluster-issuer
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)
        - name: dns-zones
          value: $(params.dns-zones)

    - name: wait-for-ssl-ready
      when:
        - input: $(params.openshift-cluster)
          operator: in
          values:
            - "true"
      taskRef:
        name: wait-for-ssl-ready
      runAfter:
        - request-ssl-cert
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)
      timeout: "20m"

    - name: extract-cert-material
      when:
        - input: $(params.openshift-cluster)
          operator: in
          values:
            - "true"
      taskRef:
        name: extract-cert-material
      runAfter:
        - wait-for-ssl-ready
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)

    - name: apply-base-workloads
      taskRef:
        name: apply-base-workloads
      runAfter:
        - extract-cert-material
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)
        - name: tier
          value: $(params.tier)
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: configure-spoke-rbac
      when:
        - input: $(params.openshift-cluster)
          operator: in
          values:
            - "true"
      taskRef:
        name: configure-spoke-rbac
      runAfter:
        - apply-base-workloads
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)
      workspaces:
        - name: shared
          workspace: shared-workspace
