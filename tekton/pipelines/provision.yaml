apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: provision
spec:
  params:
    - name: cluster-name
      type: string
    - name: git-repo-url
      type: string
      default: ""
    - name: git-revision
      type: string
      default: ""
    - name: pipeline-image
      type: string
      default: ""
    - name: base-domain
      type: string
      default: ""
    - name: keycloak-issuer-url
      type: string
      default: ""
    - name: keycloak-url
      type: string
      default: ""
    - name: keycloak-realm
      type: string
      default: ""
    - name: keycloak-admin-secret
      type: string
      default: ""
    - name: auth-realm
      type: string
      default: ""
    - name: acme-email
      type: string
      default: ""
  workspaces:
    - name: shared-workspace

  tasks:
    - name: git-clone
      taskRef:
        name: git-clone
      params:
        - name: URL
          value: $(params.git-repo-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DEPTH
          value: "1"
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: apply-cluster-crs
      taskRef:
        name: apply-cluster-crs
      runAfter:
        - git-clone
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: wait-for-hive-ready
      taskRef:
        name: wait-for-hive-ready
      runAfter:
        - apply-cluster-crs
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)
      timeout: "1h15m"

    - name: wait-for-managed-cluster
      taskRef:
        name: wait-for-managed-cluster
      runAfter:
        - wait-for-hive-ready
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)

    - name: extract-spoke-kubeconfig
      taskRef:
        name: extract-spoke-kubeconfig
      runAfter:
        - wait-for-managed-cluster
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)
      workspaces:
        - name: shared
          workspace: shared-workspace

    - name: read-cluster-tier
      taskRef:
        name: read-cluster-tier
      runAfter:
        - wait-for-managed-cluster
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)

    - name: label-for-post-provision
      taskRef:
        name: label-for-post-provision
      runAfter:
        - extract-spoke-kubeconfig
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)

    - name: trigger-post-provision
      taskRef:
        name: trigger-post-provision
      runAfter:
        - label-for-post-provision
        - read-cluster-tier
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)
        - name: tier
          value: $(tasks.read-cluster-tier.results.tier)
        - name: base-domain
          value: $(params.base-domain)
        - name: keycloak-issuer-url
          value: $(params.keycloak-issuer-url)
        - name: keycloak-url
          value: $(params.keycloak-url)
        - name: keycloak-realm
          value: $(params.keycloak-realm)
        - name: keycloak-admin-secret
          value: $(params.keycloak-admin-secret)
        - name: auth-realm
          value: $(params.auth-realm)
        - name: acme-email
          value: $(params.acme-email)
