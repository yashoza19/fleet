apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: pre-provision
spec:
  params:
    - name: cluster-name
      type: string
    - name: git-repo-url
      type: string
      default: https://github.com/redhat-openshift-partner-labs/fleet.git
    - name: git-revision
      type: string
      default: main
    - name: base-domain
      type: string
      default: example.com
    - name: keycloak-issuer-url
      type: string
      default: https://keycloak.example.com/realms/openshift
    - name: keycloak-url
      type: string
      default: https://keycloak.example.com
    - name: keycloak-realm
      type: string
      default: openshift
    - name: keycloak-admin-secret
      type: string
      default: keycloak-admin
    - name: auth-realm
      type: string
      default: "master"
    - name: acme-email
      type: string
      default: admin@example.com
    - name: pipeline-image
      type: string
      default: quay.io/rhopl/fleet-pipeline:latest
  workspaces:
    - name: shared-workspace

  tasks:
    - name: git-clone
      taskRef:
        name: git-clone
      params:
        - name: URL
          value: $(params.git-repo-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DEPTH
          value: "1"
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: create-cluster-namespace
      taskRef:
        name: create-cluster-namespace
      runAfter:
        - git-clone
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)

    - name: create-ssh-key
      taskRef:
        name: create-ssh-key
      runAfter:
        - create-cluster-namespace
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)

    - name: create-pull-secret
      taskRef:
        name: create-pull-secret
      runAfter:
        - create-cluster-namespace
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)

    - name: apply-crossplane-credentials
      taskRef:
        name: apply-crossplane-credentials
      runAfter:
        - create-ssh-key
        - create-pull-secret
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: wait-for-aws-credentials
      taskRef:
        name: wait-for-aws-credentials
      runAfter:
        - apply-crossplane-credentials
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)

    - name: transform-aws-credentials
      taskRef:
        name: transform-aws-credentials
      runAfter:
        - wait-for-aws-credentials
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)

    - name: validate-cluster-inputs
      taskRef:
        name: validate-cluster-inputs
      runAfter:
        - transform-aws-credentials
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: pipeline-image
          value: $(params.pipeline-image)

    - name: trigger-provision
      taskRef:
        name: trigger-provision
      runAfter:
        - validate-cluster-inputs
      params:
        - name: cluster-name
          value: $(params.cluster-name)
        - name: base-domain
          value: $(params.base-domain)
        - name: keycloak-issuer-url
          value: $(params.keycloak-issuer-url)
        - name: keycloak-url
          value: $(params.keycloak-url)
        - name: keycloak-realm
          value: $(params.keycloak-realm)
        - name: keycloak-admin-secret
          value: $(params.keycloak-admin-secret)
        - name: auth-realm
          value: $(params.auth-realm)
        - name: acme-email
          value: $(params.acme-email)
        - name: pipeline-image
          value: $(params.pipeline-image)
