apiVersion: v1
kind: ConfigMap
metadata:
  name: fleet-pipeline-defaults
data:
  # --- Sentinel (required for all tools) ---
  FLEET_CONFIGMAP_LOADED: "true"

  # --- Sensitive / environment-specific (MUST be overridden on hub) ---
  FLEET_KEYCLOAK_URL: "https://keycloak.example.com"
  FLEET_KEYCLOAK_REALM: "openshift"
  FLEET_KEYCLOAK_ADMIN_SECRET: "keycloak-admin"
  FLEET_KEYCLOAK_ISSUER_URL: "https://keycloak.example.com/realms/openshift"
  FLEET_BASE_DOMAIN: "example.com"
  FLEET_ACME_EMAIL: "admin@example.com"

  # --- Stable operational defaults ---
  FLEET_AUTH_REALM: "master"
  FLEET_PROVIDER_NAME: "RedHat"
  FLEET_GIT_REPO_URL: "https://github.com/redhat-openshift-partner-labs/fleet.git"
  FLEET_GIT_REVISION: "main"
  FLEET_PIPELINE_IMAGE: "quay.io/rhopl/fleet-pipeline:latest"
  FLEET_SOURCE_NAMESPACE: "openshift-config"
  FLEET_SOURCE_SECRET_NAME: "pull-secret"
  FLEET_INSECURE: "false"
  FLEET_OPENSHIFT_CLUSTER: "true"
  FLEET_CREATE_AWS_CREDS: "false"

  # --- Per-run (empty - set per invocation or via CLI args) ---
  FLEET_CLUSTER_NAME: ""
  FLEET_NAMESPACE: ""
  FLEET_TIER: ""
  FLEET_SPOKE_KUBECONFIG: ""
  FLEET_SOURCE_DIR: ""
  FLEET_OUTPUT_DIR: ""
  FLEET_CLUSTER_DIR: ""
  FLEET_DNS_ZONES: ""
  FLEET_KUBECONFIG_FILE: ""
  FLEET_VALUES_FILE: ""
  FLEET_EXTRA_SANS: ""
  FLEET_ROUTE_SAN: ""
  FLEET_TIMEOUT: ""
  FLEET_TIMEOUT_SECONDS: ""

  # --- Tool-specific overrides (non-empty where default differs) ---

  # register-keycloak-client
  FLEET_REGISTER_KEYCLOAK_CLIENT_CLUSTER_NAME: ""
  FLEET_REGISTER_KEYCLOAK_CLIENT_KEYCLOAK_URL: ""
  FLEET_REGISTER_KEYCLOAK_CLIENT_KEYCLOAK_REALM: ""
  FLEET_REGISTER_KEYCLOAK_CLIENT_KEYCLOAK_ADMIN_SECRET: ""
  FLEET_REGISTER_KEYCLOAK_CLIENT_BASE_DOMAIN: ""
  FLEET_REGISTER_KEYCLOAK_CLIENT_AUTH_REALM: ""
  FLEET_REGISTER_KEYCLOAK_CLIENT_PROVIDER_NAME: ""
  FLEET_REGISTER_KEYCLOAK_CLIENT_INSECURE: ""

  # configure-spoke-oauth
  FLEET_CONFIGURE_SPOKE_OAUTH_CLUSTER_NAME: ""
  FLEET_CONFIGURE_SPOKE_OAUTH_SPOKE_KUBECONFIG: ""
  FLEET_CONFIGURE_SPOKE_OAUTH_CLUSTER_DIR: ""
  FLEET_CONFIGURE_SPOKE_OAUTH_KEYCLOAK_ISSUER_URL: ""
  FLEET_CONFIGURE_SPOKE_OAUTH_PROVIDER_NAME: ""

  # trigger-provision
  FLEET_TRIGGER_PROVISION_CLUSTER_NAME: ""

  # trigger-post-provision
  FLEET_TRIGGER_POST_PROVISION_CLUSTER_NAME: ""
  FLEET_TRIGGER_POST_PROVISION_TIER: ""
  FLEET_TRIGGER_POST_PROVISION_BASE_DOMAIN: ""

  # create-cluster-issuer
  FLEET_CREATE_CLUSTER_ISSUER_CLUSTER_NAME: ""
  FLEET_CREATE_CLUSTER_ISSUER_ACME_EMAIL: ""

  # request-ssl-cert
  FLEET_REQUEST_SSL_CERT_CLUSTER_NAME: ""
  FLEET_REQUEST_SSL_CERT_DNS_ZONES: ""

  # wait-for-ssl-ready
  FLEET_WAIT_FOR_SSL_READY_CLUSTER_NAME: ""
  FLEET_WAIT_FOR_SSL_READY_TIMEOUT: "15m"

  # extract-cert-material
  FLEET_EXTRACT_CERT_MATERIAL_CLUSTER_NAME: ""
  FLEET_EXTRACT_CERT_MATERIAL_NAMESPACE: "openshift-ingress"

  # wait-for-hive-ready
  FLEET_WAIT_FOR_HIVE_READY_CLUSTER_NAME: ""
  FLEET_WAIT_FOR_HIVE_READY_TIMEOUT: "60m"

  # wait-for-managed-cluster
  FLEET_WAIT_FOR_MANAGED_CLUSTER_CLUSTER_NAME: ""
  FLEET_WAIT_FOR_MANAGED_CLUSTER_TIMEOUT: "15m"

  # wait-hive-uninstall
  FLEET_WAIT_HIVE_UNINSTALL_CLUSTER_NAME: ""
  FLEET_WAIT_HIVE_UNINSTALL_TIMEOUT: "25m"

  # wait-for-aws-creds
  FLEET_WAIT_FOR_AWS_CREDS_CLUSTER_NAME: ""
  FLEET_WAIT_FOR_AWS_CREDS_TIMEOUT_SECONDS: "900"

  # run-post-provision
  FLEET_RUN_POST_PROVISION_CLUSTER_NAME: ""
  FLEET_RUN_POST_PROVISION_TIER: ""
  FLEET_RUN_POST_PROVISION_NAMESPACE: ""
  FLEET_RUN_POST_PROVISION_PIPELINE_IMAGE: ""
  FLEET_RUN_POST_PROVISION_TIMEOUT: ""

  # save-spoke-kubeconfig
  FLEET_SAVE_SPOKE_KUBECONFIG_CLUSTER_NAME: ""
  FLEET_SAVE_SPOKE_KUBECONFIG_KUBECONFIG_FILE: ""
  FLEET_SAVE_SPOKE_KUBECONFIG_NAMESPACE: "openshift-pipelines"

  # create-test-vcluster
  FLEET_CREATE_TEST_VCLUSTER_CLUSTER_NAME: ""
  FLEET_CREATE_TEST_VCLUSTER_NAMESPACE: ""
  FLEET_CREATE_TEST_VCLUSTER_OUTPUT_DIR: ""
  FLEET_CREATE_TEST_VCLUSTER_VALUES_FILE: ""
  FLEET_CREATE_TEST_VCLUSTER_EXTRA_SANS: ""
  FLEET_CREATE_TEST_VCLUSTER_ROUTE_SAN: ""

  # delete-test-vcluster
  FLEET_DELETE_TEST_VCLUSTER_CLUSTER_NAME: ""
  FLEET_DELETE_TEST_VCLUSTER_NAMESPACE: ""

  # seed-test-vcluster
  FLEET_SEED_TEST_VCLUSTER_CLUSTER_NAME: ""
  FLEET_SEED_TEST_VCLUSTER_KUBECONFIG_FILE: ""
  FLEET_SEED_TEST_VCLUSTER_TIER: ""
  FLEET_SEED_TEST_VCLUSTER_CREATE_AWS_CREDS: ""

  # create-pull-secret
  FLEET_CREATE_PULL_SECRET_CLUSTER_NAME: ""
  FLEET_CREATE_PULL_SECRET_SOURCE_NAMESPACE: "openshift-config"
  FLEET_CREATE_PULL_SECRET_SOURCE_SECRET_NAME: "pull-secret"

  # extract-kubeconfig
  FLEET_EXTRACT_KUBECONFIG_CLUSTER_NAME: ""
  FLEET_EXTRACT_KUBECONFIG_OUTPUT_DIR: ""
  FLEET_EXTRACT_KUBECONFIG_SPOKE_KUBECONFIG: ""

  # apply-base-workloads
  FLEET_APPLY_BASE_WORKLOADS_CLUSTER_NAME: ""
  FLEET_APPLY_BASE_WORKLOADS_SOURCE_DIR: ""
  FLEET_APPLY_BASE_WORKLOADS_SPOKE_KUBECONFIG: ""

  # configure-spoke-rbac
  FLEET_CONFIGURE_SPOKE_RBAC_CLUSTER_NAME: ""
  FLEET_CONFIGURE_SPOKE_RBAC_SPOKE_KUBECONFIG: ""

  # create-namespace
  FLEET_CREATE_NAMESPACE_CLUSTER_NAME: ""

  # create-ssh-key
  FLEET_CREATE_SSH_KEY_CLUSTER_NAME: ""

  # apply-cluster-crs
  FLEET_APPLY_CLUSTER_CRS_CLUSTER_NAME: ""
  FLEET_APPLY_CLUSTER_CRS_SOURCE_DIR: ""

  # apply-crossplane-creds
  FLEET_APPLY_CROSSPLANE_CREDS_CLUSTER_NAME: ""
  FLEET_APPLY_CROSSPLANE_CREDS_SOURCE_DIR: ""

  # cleanup-hub-artifacts
  FLEET_CLEANUP_HUB_ARTIFACTS_CLUSTER_NAME: ""

  # delete-cluster-resources
  FLEET_DELETE_CLUSTER_RESOURCES_CLUSTER_NAME: ""

  # label-post-provision
  FLEET_LABEL_POST_PROVISION_CLUSTER_NAME: ""

  # read-cluster-tier
  FLEET_READ_CLUSTER_TIER_CLUSTER_NAME: ""

  # transform-aws-creds
  FLEET_TRANSFORM_AWS_CREDS_CLUSTER_NAME: ""

  # validate-inputs
  FLEET_VALIDATE_INPUTS_CLUSTER_NAME: ""

  # verify-deprovision
  FLEET_VERIFY_DEPROVISION_CLUSTER_NAME: ""
