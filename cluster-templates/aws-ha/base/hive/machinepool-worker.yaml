apiVersion: hive.openshift.io/v1
kind: MachinePool
metadata:
  name: cluster-placeholder-worker
  namespace: cluster-placeholder
spec:
  clusterDeploymentRef:
    name: cluster-placeholder
  name: worker
  platform:
    aws:
      rootVolume:
        iops: 4000
        size: 100
        type: gp3
      type: m5.2xlarge
      zones:
        - us-east-1a
        - us-east-1b
        - us-east-1c
  replicas: 3
  labels:
    node-role.kubernetes.io/worker: ""
